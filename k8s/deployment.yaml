apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexusagent
  labels:
    app: nexusagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexusagent
  template:
    metadata:
      labels:
        app: nexusagent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: nexusagent
          image: nexusagent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: NEXUS_HOME
              value: "/app/data"
            - name: NEXUS_DEBUG
              value: "false"
          envFrom:
            - secretRef:
                name: nexusagent-secrets
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nexusagent-data
---
apiVersion: v1
kind: Service
metadata:
  name: nexusagent
spec:
  selector:
    app: nexusagent
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexusagent-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
