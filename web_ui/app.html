<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NexusAgent</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--text-muted:#8b949e;--accent:#58a6ff;--success:#3fb950;--warning:#d29922;--danger:#f85149}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;height:100vh;display:flex;flex-direction:column}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
h1{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
h1 span{font-size:11px;color:var(--text-muted);font-weight:400}
.badge{padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500}
.badge.idle{background:rgba(88,166,255,.15);color:var(--accent)}
.badge.thinking{background:rgba(210,153,34,.15);color:var(--warning);animation:pulse 1.5s infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:.5}100%{opacity:1}}
main{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:12px;max-width:800px;margin:0 auto;width:100%}
.msg{max-width:85%;padding:12px 16px;border-radius:10px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg.user{align-self:flex-end;background:var(--accent);color:#fff}
.msg.agent{align-self:flex-start;background:var(--surface);border:1px solid var(--border)}
.msg.system{align-self:center;font-size:12px;color:var(--text-muted);background:var(--surface);border:1px dashed var(--border);opacity:.8}
.msg.error{align-self:flex-start;background:rgba(248,81,73,.1);border:1px solid var(--danger);color:var(--danger)}
.msg pre{background:var(--bg);padding:10px;border-radius:6px;overflow-x:auto;margin:8px 0;border:1px solid var(--border);font-size:13px}
.msg code{font-family:'Cascadia Code',monospace;font-size:13px}
.msg p{margin:4px 0}
.diag-bar{display:flex;gap:6px;flex-wrap:wrap;padding:8px 24px 0;max-width:800px;margin:0 auto;width:100%}
.diag-bar button{font-size:11px;padding:5px 10px;background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:6px;cursor:pointer}
.diag-bar button:hover{border-color:var(--accent);color:var(--accent)}
footer{background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;display:flex;gap:10px;align-items:flex-end}
#input-box{flex:1;resize:none;min-height:44px;max-height:150px;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;outline:none;font-family:inherit;line-height:1.5}
#input-box:focus{border-color:var(--accent)}
#input-box::placeholder{color:var(--text-muted)}
button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
button:hover{opacity:.85}
button:disabled{opacity:.4;cursor:not-allowed}
button.secondary{background:transparent;border:1px solid var(--border);color:var(--text-muted)}
.spinner{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);animation:dot 1.4s infinite;margin-left:4px}
.spinner:nth-child(2){animation-delay:.2s}
.spinner:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:0}40%{opacity:1}}
.hist-chart{display:flex;align-items:flex-end;gap:3px;height:120px;padding:8px;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin:8px 0}
.hist-bar{flex:1;border-radius:3px 3px 0 0;min-height:2px;opacity:.85}
.hist-bar:hover{opacity:1}
.hist-xaxis{display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);margin-top:4px}
</style>
</head>
<body>
<header>
  <h1>🜁 NexusAgent <span>v3.3</span></h1>
  <span id="status-badge" class="badge idle">就绪</span>
</header>
<div class="diag-bar">
  <button onclick="runDiag('health')">Health</button>
  <button onclick="runDiag('connectivity')">Connectivity</button>
  <button onclick="runDiag('modules')">Modules</button>
  <button onclick="runDiag('audit')">Audit</button>
  <button onclick="runDiag('ux')">UX</button>
  <button onclick="runHistory()">History</button>
  <button onclick="runAlerts()">Alerts</button>
  <button onclick="runExport()">Export</button>
  <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted);cursor:pointer;margin-left:auto"><input type="checkbox" id="ar-toggle" checked onchange="toggleAR()"> Auto-refresh</label>
</div>
<main id="chat-history">
  <div class="msg system">NexusAgent v3.3 · DeepSeek · 就绪</div>
</main>
<footer>
  <textarea id="input-box" placeholder="输入消息… (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
  <button id="send-btn">发送</button>
</footer>
<script>
const h=document.getElementById('chat-history'),i=document.getElementById('input-box'),
      b=document.getElementById('send-btn'),s=document.getElementById('status-badge');
let isProcessing=false,session='web_'+Date.now();
let autoRefreshTimer=null,autoRefreshEnabled=true,lastDiagType='';

function append(role,text){
  const d=document.createElement('div');d.className='msg '+role;
  let html=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  html=html.replace(/```(\w*)\n?([\s\S]*?)```/g,'<pre><code>$2</code></pre>');
  html=html.replace(/`([^`]+)`/g,'<code>$1</code>');
  html=html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  html=html.replace(/\n/g,'<br>');
  d.innerHTML=html;h.appendChild(d);h.parentElement.scrollTop=h.parentElement.scrollHeight
}

async function send(){
  const t=i.value.trim();if(!t||isProcessing)return;
  append('user',t);i.value='';isProcessing=true;b.disabled=true;s.textContent='思考中…';s.className='badge thinking';
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t,session})});
    const d=await r.json();
    if(d.ok) append('agent',d.response);
    else append('error',d.error||'Unknown error');
  }catch(e){append('error','连接失败: '+e.message)}
  s.textContent='就绪';s.className='badge idle';isProcessing=false;b.disabled=false
}

function _esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function _badge(t,cls){const c=cls==='ok'?'var(--success)':cls==='warn'?'var(--warning)':'var(--danger)';return `<span style="display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600;background:${c}22;color:${c}">${_esc(t)}</span>`}

function toggleAR(){
  autoRefreshEnabled=document.getElementById('ar-toggle').checked;
  if(!autoRefreshEnabled&&autoRefreshTimer){clearInterval(autoRefreshTimer);autoRefreshTimer=null}
}

async function runDiag(type){
  lastDiagType=type;
  if(autoRefreshTimer){clearInterval(autoRefreshTimer);autoRefreshTimer=null}
  append('system','Running '+type+'…');
  try{
    let url='/api/diagnostics/'+type;
    if(type==='ux') url+='?theme=dark&model=web';
    const r=await fetch(url);
    const d=await r.json();
    if(!d.ok){append('error',d.error||'Diagnostic error');return}
    let out='';
    switch(type){
      case 'health':{
        const m=d.metrics||{};
        out+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">`;
        out+=`<div style="flex:1;min-width:90px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px"><div style="font-size:10px;color:var(--text-muted)">Status</div><div style="font-size:16px;font-weight:700;color:${d.overall_healthy?'var(--success)':'var(--danger)'}">${d.overall_healthy?'Healthy':'Issues'}</div></div>`;
        out+=`<div style="flex:1;min-width:90px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px"><div style="font-size:10px;color:var(--text-muted)">Latency</div><div style="font-size:16px;font-weight:700">${(m.avg_latency_ms||0).toFixed(0)}ms</div></div>`;
        out+=`<div style="flex:1;min-width:90px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px"><div style="font-size:10px;color:var(--text-muted)">Sessions</div><div style="font-size:16px;font-weight:700">${m.active_sessions||0}</div></div>`;
        out+=`</div>`;
        const bks=Object.entries(d.backends||{});
        if(bks.length){
          out+=`<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:6px"><thead><tr style="border-bottom:1px solid var(--border)"><th style="text-align:left;padding:4px 6px;color:var(--text-muted)">Backend</th><th style="text-align:left;padding:4px 6px;color:var(--text-muted)">Status</th><th style="text-align:left;padding:4px 6px;color:var(--text-muted)">Err%</th><th style="text-align:left;padding:4px 6px;color:var(--text-muted)">p99</th></tr></thead><tbody>`;
          for(const [n,i] of bks){
            out+=`<tr><td style="padding:4px 6px;border-bottom:1px solid var(--border)">${_esc(n)}</td><td style="padding:4px 6px;border-bottom:1px solid var(--border)">${i.is_healthy?_badge('OK','ok'):_badge('Fail','err')}</td><td style="padding:4px 6px;border-bottom:1px solid var(--border)">${((i.error_rate||0)*100).toFixed(1)}%</td><td style="padding:4px 6px;border-bottom:1px solid var(--border)">${i.p99_latency_ms||0}ms</td></tr>`;
          }
          out+=`</tbody></table>`;
        }
        break;
      }
      case 'connectivity':{
        out+=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">`;
        const probes=d.probes||{};
        for(const [n,i] of Object.entries(probes)){
          const ok=i.status==='ok';
          out+=`<div style="flex:1;min-width:80px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 8px"><div style="font-size:10px;color:var(--text-muted)">${_esc(n)}</div><div style="font-size:13px;font-weight:600;color:${ok?'var(--success)':'var(--danger)'}">${ok?'OK':'Fail'}</div></div>`;
        }
        out+=`</div>`;
        break;
      }
      case 'modules':{
        const pct=d.total?Math.round((d.healthy/d.total)*100):0;
        out+=`<div style="margin-bottom:8px;font-size:13px"><strong>${d.healthy}/${d.total}</strong> healthy <span style="color:${pct<80?'var(--warning)':'var(--success)'}">(${pct}%)</span></div>`;
        out+=`<table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="border-bottom:1px solid var(--border)"><th style="text-align:left;padding:4px 6px;color:var(--text-muted)">Module</th><th style="text-align:left;padding:4px 6px;color:var(--text-muted)">Status</th></tr></thead><tbody>`;
        for(const m of d.modules||[]){
          out+=`<tr><td style="padding:4px 6px;border-bottom:1px solid var(--border)">${_esc(m.name)}</td><td style="padding:4px 6px;border-bottom:1px solid var(--border)">${m.status==='ok'?_badge('OK','ok'):_badge('Fail','err')}</td></tr>`;
        }
        out+=`</tbody></table>`;
        break;
      }
      case 'audit':{
        out+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px">`;
        out+=`<div style="flex:1;min-width:80px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 8px"><div style="font-size:10px;color:var(--text-muted)">Traces</div><div style="font-size:14px;font-weight:600">${d.summary.recent_traces_count||0}</div></div>`;
        out+=`<div style="flex:1;min-width:80px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 8px"><div style="font-size:10px;color:var(--text-muted)">Audit</div><div style="font-size:14px;font-weight:600">${d.summary.audit_entries_loaded||0}</div></div>`;
        out+=`</div>`;
        if(d.audit&&d.audit.length){
          out+=`<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:6px"><thead><tr style="border-bottom:1px solid var(--border)"><th style="text-align:left;padding:4px 6px;color:var(--text-muted)">Time</th><th style="text-align:left;padding:4px 6px;color:var(--text-muted)">Level</th><th style="text-align:left;padding:4px 6px;color:var(--text-muted)">Event</th></tr></thead><tbody>`;
          for(const e of d.audit.slice(0,10)){out+=`<tr><td style="padding:4px 6px;border-bottom:1px solid var(--border)">${_esc(e.timestamp||'')}</td><td style="padding:4px 6px;border-bottom:1px solid var(--border)">${_esc(e.level||'')}</td><td style="padding:4px 6px;border-bottom:1px solid var(--border)">${_esc(e.event||'')}</td></tr>`;}
          out+=`</tbody></table>`;
        }
        break;
      }
      case 'ux':{
        const sc=d.score||0;
        out+=`<div style="margin-bottom:8px"><strong>Score: ${sc}/100</strong> <span style="color:${sc>=80?'var(--success)':sc>=50?'var(--warning)':'var(--danger)'}">${sc>=80?'Good':sc>=50?'Fair':'Poor'}</span></div>`;
        if(d.recommendations&&d.recommendations.length){out+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:12px"><strong>Recommendations</strong><ul style="margin:4px 0 0 16px;padding:0">`;for(const r of d.recommendations){out+=`<li>${_esc(r)}</li>`;}out+=`</ul></div>`;}
        break;
      }
      default:{
        out=`<pre style="background:var(--bg);padding:10px;border-radius:6px;overflow-x:auto;border:1px solid var(--border);font-size:12px"><code>${_esc(JSON.stringify(d,null,2))}</code></pre>`;
      }
    }
    append('agent',out);
    if(autoRefreshEnabled&&['health','connectivity','modules','audit','ux'].includes(type)){
      if(autoRefreshTimer)clearInterval(autoRefreshTimer);
      autoRefreshTimer=setInterval(()=>runDiagSilent(type),30000);
    }
  }catch(e){append('error','Diagnostic failed: '+e.message)}
}

async function runDiagSilent(type){
  let url='/api/diagnostics/'+type;
  if(type==='ux')url+='?theme=dark&model=web';
  try{
    const r=await fetch(url);
    const d=await r.json();
    if(!d.ok)return;
    // Update last diagnostic message in place instead of appending
    const msgs=document.querySelectorAll('#chat-history .msg.agent');
    const last=msgs[msgs.length-1];
    if(last&&last.dataset.diagType===type){last.remove()}
    let out='';
    switch(type){
      case 'health':{
        const m=d.metrics||{};
        out+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">`;
        out+=`<div style="flex:1;min-width:90px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px"><div style="font-size:10px;color:var(--text-muted)">Status</div><div style="font-size:16px;font-weight:700;color:${d.overall_healthy?'var(--success)':'var(--danger)'}">${d.overall_healthy?'Healthy':'Issues'}</div></div>`;
        out+=`<div style="flex:1;min-width:90px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px"><div style="font-size:10px;color:var(--text-muted)">Latency</div><div style="font-size:16px;font-weight:700">${(m.avg_latency_ms||0).toFixed(0)}ms</div></div>`;
        out+=`<div style="flex:1;min-width:90px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px"><div style="font-size:10px;color:var(--text-muted)">Sessions</div><div style="font-size:16px;font-weight:700">${m.active_sessions||0}</div></div>`;
        out+=`</div>`;
        if(d.backends){out+=`<table style="width:100%;font-size:12px;border-collapse:collapse"><thead><tr style="color:var(--text-muted)"><th style="text-align:left;padding:4px">Backend</th><th style="text-align:left;padding:4px">Status</th><th style="text-align:left;padding:4px">Error%</th><th style="text-align:left;padding:4px">P99</th></tr></thead><tbody>`;for(const[n,i]of Object.entries(d.backends)){out+=`<tr><td style="padding:4px;border-bottom:1px solid var(--border)">${_esc(n)}</td><td style="padding:4px;border-bottom:1px solid var(--border)">${i.is_healthy?_badge('OK','ok'):_badge('Fail','err')}</td><td style="padding:4px;border-bottom:1px solid var(--border)">${((i.error_rate||0)*100).toFixed(1)}%</td><td style="padding:4px;border-bottom:1px solid var(--border)">${i.p99_latency_ms||0}ms</td></tr>`;}out+=`</tbody></table>`;}
        break;
      }
      case 'connectivity':{
        const pct=d.total?Math.round((d.healthy/d.total)*100):0;
        out+=`<div style="margin-bottom:8px;font-size:13px"><strong>${d.healthy}/${d.total}</strong> healthy <span style="color:${pct<80?'var(--warning)':'var(--success)'}">(${pct}%)</span></div>`;
        if(d.probes){out+=`<div style="font-size:12px">`;for(const[n,p]of Object.entries(d.probes)){out+=`<div style="display:flex;align-items:center;gap:8px;padding:4px 0"><span style="width:8px;height:8px;border-radius:50%;background:${p.status==='ok'?'var(--success)':'var(--danger)'}"></span><span style="min-width:100px;font-weight:500">${_esc(n)}</span><span style="color:var(--text-muted);font-size:11px">${_esc(p.latency_ms!==undefined?p.latency_ms+'ms':p.error||'')}</span></div>`;}out+=`</div>`;}
        break;
      }
      case 'modules':{
        const pct=d.total?Math.round((d.healthy/d.total)*100):0;
        out+=`<div style="margin-bottom:8px;font-size:13px"><strong>${d.healthy}/${d.total}</strong> healthy <span style="color:${pct<80?'var(--warning)':'var(--success)'}">(${pct}%)</span></div>`;
        if(d.modules){out+=`<table style="width:100%;font-size:12px;border-collapse:collapse"><thead><tr style="color:var(--text-muted)"><th style="text-align:left;padding:4px">Module</th><th style="text-align:left;padding:4px">Status</th></tr></thead><tbody>`;for(const m of d.modules){out+=`<tr><td style="padding:4px;border-bottom:1px solid var(--border)">${_esc(m.name)}</td><td style="padding:4px;border-bottom:1px solid var(--border)">${m.status==='ok'?_badge('OK','ok'):_badge('Fail','err')}</td></tr>`;}out+=`</tbody></table>`;}
        break;
      }
      case 'audit':{
        out+=`<div style="display:flex;gap:8px;margin-bottom:8px">`;
        out+=`<div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px"><div style="font-size:10px;color:var(--text-muted)">Interceptions</div><div style="font-size:16px;font-weight:700">${d.summary.security_interceptions_total||0}</div></div>`;
        out+=`<div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px"><div style="font-size:10px;color:var(--text-muted)">Traces</div><div style="font-size:16px;font-weight:700">${d.summary.recent_traces_count||0}</div></div>`;
        out+=`</div>`;
        if(d.audit&&d.audit.length){out+=`<table style="width:100%;font-size:12px;border-collapse:collapse"><thead><tr style="color:var(--text-muted)"><th style="text-align:left;padding:4px">Time</th><th style="text-align:left;padding:4px">Level</th><th style="text-align:left;padding:4px">Event</th></tr></thead><tbody>`;for(const e of d.audit.slice(0,10)){out+=`<tr><td style="padding:4px;border-bottom:1px solid var(--border)">${_esc(e.timestamp||'')}</td><td style="padding:4px;border-bottom:1px solid var(--border)">${_esc(e.level||'')}</td><td style="padding:4px;border-bottom:1px solid var(--border)">${_esc(e.event||'')}</td></tr>`;}out+=`</tbody></table>`;}
        break;
      }
      case 'ux':{
        const sc=d.score||0;
        out+=`<div style="margin-bottom:8px"><strong>Score: ${sc}/100</strong> <span style="color:${sc>=80?'var(--success)':sc>=50?'var(--warning)':'var(--danger)'}">${sc>=80?'Good':sc>=50?'Fair':'Poor'}</span></div>`;
        if(d.recommendations&&d.recommendations.length){out+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:12px"><strong>Recommendations</strong><ul style="margin:4px 0 0 16px;padding:0">`;for(const r of d.recommendations){out+=`<li>${_esc(r)}</li>`;}out+=`</ul></div>`;}
        break;
      }
    }
    const div=document.createElement('div');div.className='msg agent';div.dataset.diagType=type;div.innerHTML=out;
    document.getElementById('chat-history').appendChild(div);
    div.scrollIntoView({behavior:'smooth'});
  }catch(e){}
}

async function runHistory(){
  append('system','Loading history…');
  try{
    const category=prompt('Category? (health/connectivity/modules/ux)','health')||'health';
    const hours=prompt('Hours? (1/6/24/72)','24')||'24';
    const r=await fetch('/api/diagnostics/history?category='+encodeURIComponent(category)+'&hours='+encodeURIComponent(hours));
    const d=await r.json();
    if(!d.ok){append('error',d.error||'History error');return}
    const pts=d.points||[];
    if(!pts.length){append('agent','No history data for selected range.');return}
    function metric(p){
      const data=p.data||{};
      if(category==='health') return data.overall_healthy?100:0;
      if(category==='connectivity'||category==='modules'){const t=data.total||1,h=data.healthy||0;return Math.round((h/t)*100)}
      if(category==='ux') return data.score||0;
      return 0;
    }
    let display=pts.map(p=>({ts:p.timestamp,val:metric(p)}));
    if(display.length>24){const step=Math.ceil(display.length/24),down=[];for(let i=0;i<display.length;i+=step){const chunk=display.slice(i,i+step);const avg=Math.round(chunk.reduce((s,c)=>s+c.val,0)/chunk.length);down.push({ts:chunk[chunk.length-1].ts,val:avg})}display=down}
    let out='<div style="font-size:12px;font-weight:600;margin-bottom:4px">'+_esc(category)+' — last '+_esc(hours)+'h</div>';
    out+='<div class="hist-chart">';
    for(const pt of display){const pct=Math.max(0,Math.min(100,pt.val));const c=pct>=80?'var(--success)':pct>=50?'var(--warning)':'var(--danger)';out+='<div class="hist-bar" style="height:'+pct+'%;background:'+c+'" title="'+new Date(pt.ts*1000).toLocaleTimeString()+' : '+pt.val+'%"></div>'}
    out+='</div>';
    out+='<div class="hist-xaxis"><span>'+new Date(display[0].ts*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+'</span><span>'+new Date(display[display.length-1].ts*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+'</span></div>';
    append('agent',out);
  }catch(e){append('error','History failed: '+e.message)}
}

async function runAlerts(){
  append('system','Loading alerts…');
  try{
    const level=prompt('Level filter? (critical/error/warning/info/leave empty)','')||'';
    const hours=prompt('Hours? (1/6/24/72)','24')||'24';
    const r=await fetch('/api/diagnostics/alerts?hours='+encodeURIComponent(hours)+(level?'&level='+encodeURIComponent(level):''));
    const d=await r.json();
    if(!d.ok){append('error',d.error||'Alerts error');return}
    const alerts=d.alerts||[];
    if(!alerts.length){append('agent','No alerts for selected range.');return}
    let out='<div style="font-size:12px;font-weight:600;margin-bottom:6px">Alerts ('+alerts.length+')</div>';
    out+='<table style="width:100%;font-size:11px;border-collapse:collapse"><thead><tr style="color:var(--text-muted)"><th style="text-align:left;padding:3px">Time</th><th style="text-align:left;padding:3px">Level</th><th style="text-align:left;padding:3px">Title</th><th style="text-align:left;padding:3px">Source</th></tr></thead><tbody>';
    for(const a of alerts.slice(0,20)){
      const lc=a.level==='critical'||a.level==='error'?'var(--danger)':a.level==='warning'?'var(--warning)':'var(--success)';
      out+=`<tr><td style="padding:3px;border-bottom:1px solid var(--border)">${new Date(a.timestamp*1000).toLocaleTimeString()}</td><td style="padding:3px;border-bottom:1px solid var(--border);color:${lc}">${_esc(a.level)}</td><td style="padding:3px;border-bottom:1px solid var(--border)">${_esc(a.title)}</td><td style="padding:3px;border-bottom:1px solid var(--border)">${_esc(a.source)}</td></tr>`;
    }
    out+='</tbody></table>';
    append('agent',out);
  }catch(e){append('error','Alerts failed: '+e.message)}
}

async function runExport(){
  append('system','Exporting report…');
  try{
    const fmt=prompt('Format? (markdown/json)','markdown')||'markdown';
    if(fmt==='markdown'){
      const r=await fetch('/api/diagnostics/export');
      const d=await r.json();
      if(!d.ok){append('error','Export failed');return}
      const blob=new Blob([d.markdown],{type:'text/markdown'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download='nexusagent-report.md';document.body.appendChild(a);a.click();setTimeout(()=>URL.revokeObjectURL(url),1000);
      append('agent','Report downloaded.');
    }else{
      const endpoints=['health/full','connectivity','modules','audit','ux'];
      const results={};
      for(const ep of endpoints){const r=await fetch('/api/diagnostics/'+ep);results[ep]=await r.json();}
      const blob=new Blob([JSON.stringify(results,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download='nexusagent-report.json';document.body.appendChild(a);a.click();setTimeout(()=>URL.revokeObjectURL(url),1000);
      append('agent','Report downloaded.');
    }
  }catch(e){append('error','Export failed: '+e.message)}
}

b.addEventListener('click',send);
i.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
</script>
