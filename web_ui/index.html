<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tools</title>
<style>
:root {--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--text-muted:#8b949e;--accent:#58a6ff;--success:#3fb950;--warning:#d29922;--danger:#f85149}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--surface);color:var(--text)}
#app{padding:12px;display:flex;flex-direction:column;gap:10px;height:100vh}
h3{font-size:13px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
#tool-list{list-style:none;display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto}
#tool-list li{font-size:12px;padding:6px 8px;border-radius:6px;background:var(--bg);border:1px solid var(--border);display:flex;justify-content:space-between}
#tool-list .name{color:var(--accent);font-weight:600}
#tool-list .status{font-size:10px;padding:1px 6px;border-radius:4px}
.status.ok{background:rgba(63,185,80,.15);color:var(--success)}
.status.err{background:rgba(248,81,73,.15);color:var(--danger)}
.stat-row{display:flex;justify-content:space-between;font-size:12px;padding:5px 8px;border-radius:6px;background:var(--bg);border:1px solid var(--border)}
.stat-row span:first-child{color:var(--text-muted)}
.stat-row span:last-child{font-weight:600}
</style>
</head>
<body>
<div id="app">
<h3>Status</h3>
<div class="stat-row"><span>Provider</span><span id="s-provider">-</span></div>
<div class="stat-row"><span>Model</span><span id="s-model">-</span></div>
<div class="stat-row"><span>Security</span><span id="s-security">-</span></div>
<div class="stat-row"><span>Trust</span><span id="s-trust">-</span></div>
<h3 style="margin-top:8px">Tools</h3>
<ul id="tool-list"><li style="color:var(--text-muted)">No calls yet</li></ul>
</div>
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<script>
let bridge=null;
new QWebChannel(qt.webChannelTransport,function(ch){bridge=ch.objects.agentBridge});
function appendToolCall(name){
  const ul=document.getElementById('tool-list');
  if(ul.children[0]&&ul.children[0].textContent==='No calls yet')ul.innerHTML='';
  const li=document.createElement('li');
  li.innerHTML=`<span class="name">${escapeHtml(name)}</span><span class="status ok">OK</span>`;
  ul.insertBefore(li,ul.firstChild);
  if(ul.children.length>10)ul.lastChild.remove()
}
function showToast(m){}
function setStatus(t,l){}
function appendAgentMessage(m){}
function appendError(e){}
function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
</script>
</body>
</html>
