volumes:
  nexusagent_data:
    driver: local
  nexusagent_uploads:
    driver: local
  nexusagent_chroma:
    driver: local
  redis_data:
    driver: local
  # prometheus_data:
  #   driver: local
  # grafana_data:
  #   driver: local

networks:
  nexusagent_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
